<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARISH KANWAL Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@900&display=swap" rel="stylesheet">

<style>
:root { --primary: #e91e63; --whatsapp: #25d366; --bg: #f8f9fa; --star: #f1c40f; }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #333; display: flex; flex-direction: column; min-height: 100vh; }

/* HEADER & NAV */
.top-bar { background: #222; color: white; font-size: 10px; display: flex; justify-content: space-between; padding: 8px 20px; }
.header { background: white; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.store-name { font-family: 'Roboto', sans-serif; font-size: 26px; font-weight: 900; color: var(--primary); text-transform: uppercase; cursor: pointer; letter-spacing: -1px; }
.search-box { flex: 1; margin: 0 20px; display: flex; }
.search-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px 0 0 6px; outline: none; }
.search-box button { background: var(--primary); color: white; border: none; padding: 0 20px; cursor: pointer; border-radius: 0 6px 6px 0; font-weight: bold; }
.nav { background: #fff; padding: 12px 20px; display: flex; gap: 25px; font-size: 14px; border-bottom: 1px solid #eee; overflow-x: auto; }
.nav a { text-decoration: none; color: #555; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
.nav a.active, .nav a:hover { color: var(--primary); }

/* GRID & CARDS */
.container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; flex: 1; }
.card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #eee; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }

/* Image & Zoom */
.img-container { width: 100%; height: 180px; overflow: hidden; position: relative; }
.card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
.card:hover img { transform: scale(1.1); }

/* Discount Badge */
.discount-badge { position: absolute; top: 8px; left: 8px; background: #ff4757; color: white; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; z-index: 10; }

.card-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
.card h3 { font-size: 13px; font-weight: 600; margin: 0; height: 36px; overflow: hidden; line-height: 1.4; color: #222; }

/* Stars & Rating */
.rating { color: var(--star); font-size: 11px; margin: 6px 0; }
.sold-count { color: #888; font-size: 10px; margin-left: 4px; }

.price { color: var(--primary); font-weight: 700; font-size: 17px; margin: 5px 0; }
.old-price { font-size: 12px; color: #aaa; text-decoration: line-through; margin-left: 4px; }

/* Low Stock Alert */
.stock-alert { color: #d63031; font-size: 10px; font-weight: 700; margin: 5px 0; }
.stock-bar { width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
.stock-fill { width: 35%; height: 100%; background: #d63031; }

.buy-btn { width: 100%; border: none; background: var(--primary); color: white; padding: 10px; font-size: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: auto; }

/* NOTIFICATION POPUP */
#order-notification {
    display: none; position: fixed; bottom: 30px; left: 20px; 
    background: white; padding: 12px 18px; border-radius: 12px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 2500; 
    border-left: 6px solid var(--primary); max-width: 280px;
    animation: slideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.notif-flex { display: flex; align-items: center; gap: 12px; }
.notif-icon { background: #fff0f5; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.notif-text { font-size: 11px; color: #444; line-height: 1.4; }

/* FOOTER */
footer { background: #1a1a1a; color: #999; padding: 30px 20px; text-align: center; font-size: 12px; margin-top: 40px; }
.footer-links a { color: white; margin: 0 10px; text-decoration: none; cursor: pointer; }

/* MODAL */
.modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
.modal-content { background: white; margin: 15% auto; padding: 25px; border-radius: 12px; width: 80%; max-width: 450px; position: relative; }

@keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.whatsapp-float { position: fixed; bottom: 30px; right: 25px; background: var(--whatsapp); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 2000; transition: 0.3s; }
</style>
</head>
<body>

<div class="top-bar">
  <span>📞 03195624640</span>
  <span>🚚 FREE DELIVERY ON ALL ORDERS</span>
</div>

<div class="header">
  <div class="store-name" onclick="filterCategory('all')">SARISH KANWAL</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchProduct()">
    <button onclick="searchProduct()">Search</button>
  </div>
</div>

<div class="nav">
  <a onclick="filterCategory('all')" class="active">All</a>
  <a onclick="filterCategory('clothes')">Clothes</a>
  <a onclick="filterCategory('shoes')">Shoes</a>
  <a onclick="filterCategory('cosmetics')">Cosmetics</a>
</div>

<div class="container" id="productContainer">
  <div class="card" data-category="clothes">
    <div class="discount-badge">0% OFF</div>
    <div class="img-container"><img src="product1.jpg" alt="Dress"></div>
    <div class="card-content">
      <h3>Premium Luxury Collection Dress</h3>
      <div class="rating">★★★★★ <span class="sold-count">(150+ Sold)</span></div>
      <p class="price">Rs. 3,500 <span class="old-price">Rs. 3,500</span></p>
      <div class="stock-alert">🔥 Only 4 left in stock!</div>
      <div class="stock-bar"><div class="stock-fill"></div></div>
      <button class="buy-btn" onclick="buyProduct('Dress - 3500')">ORDER ON WHATSAPP</button>
    </div>
  </div>
</div>

<div id="order-notification">
    <div class="notif-flex">
        <div class="notif-icon">🛍️</div>
        <div class="notif-text">
            <span id="notif-content"></span><br>
            <small style="color:#999">Just now ✅</small>
        </div>
    </div>
</div>

<a href="https://wa.me/923195624640" class="whatsapp-float" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30">
</a>

<footer>
  <div class="footer-links" style="margin-bottom: 15px;">
    <a onclick="openModal('privacy')">Privacy Policy</a>
    <a onclick="openModal('contact')">Contact Us</a>
  </div>
  <p>&copy; 2026 SARISH KANWAL Store.</p>
  <p style="color: #666; font-size: 11px;">Pakistan, Punjab, Rahim Yar Khan</p>
</footer>

<div id="infoModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:20px">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
function searchProduct() {
    let input = document.getElementById('searchInput').value.toLowerCase().trim();
    let cards = document.getElementsByClassName('card');
    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('h3').innerText.toLowerCase();
        cards[i].style.display = (title.includes(input) || input === "") ? "" : "none";
    }
}

function filterCategory(cat) {
    let cards = document.getElementsByClassName('card');
    for (let i = 0; i < cards.length; i++) {
        let cardCat = cards[i].getAttribute('data-category');
        cards[i].style.display = (cat === 'all' || cardCat === cat) ? "" : "none";
    }
}

function buyProduct(p) { window.open(`https://wa.me/923195624640?text=I want to order: ${p}`, "_blank"); }

function openModal(t) {
    const b = document.getElementById('modalBody');
    if(t=='privacy') b.innerHTML="<h2>Privacy</h2><p>Your data is safe.</p>";
    else b.innerHTML="<h2>Contact Us</h2><p>WhatsApp: 03195624640<br>Location: Pakistan, Punjab, Rahim Yar Khan</p>";
    document.getElementById('infoModal').style.display="block";
}
function closeModal() { document.getElementById('infoModal').style.display="none"; }

// --- GLOBAL ORDER NOTIFICATIONS ---
const fNames = ["Ahmed", "Sana", "Rajesh", "Fatima", "John", "Rahul", "Zainab", "Ali", "Mehak", "Vikram", "Ayesha", "Omar"];
const lNames = ["Khan", "Sharma", "Malik", "Patel", "Sheikh", "Javed", "Singh", "Shah"];
const locs = ["Lahore, PK", "Mumbai, IN", "Dubai, UAE", "Karachi, PK", "Delhi, IN", "Rahim Yar Khan, PK", "London, UK", "New York, USA"];
const prods = ["Luxury Bag", "Embroidered Suit", "Whitening Serum", "Designer Clutch"];

function showNotification() {
    const n = document.getElementById('order-notification');
    const content = document.getElementById('notif-content');
    const name = fNames[Math.floor(Math.random()*fNames.length)] + " " + lNames[Math.floor(Math.random()*lNames.length)];
    const loc = locs[Math.floor(Math.random()*locs.length)];
    const prod = prods[Math.floor(Math.random()*prods.length)];

    content.innerHTML = `<b>${name}</b> from <b>${loc}</b> bought a <b>${prod}</b>`;
    n.style.display = "block";
    setTimeout(() => { n.style.display = "none"; }, 5000);
    setTimeout(showNotification, Math.random() * (25000 - 15000) + 15000);
}
setTimeout(showNotification, 4000);
</script>

</body>
</html>
